  <h1>Portfolio Overview</h1>
  <div id="portfolio">Loading...</div>

  <script>
    fetch('portfolio.json')
      .then(res => res.json())
      .then(data => {
        const html = `
          Stock Price (USD): $${data.price_usd.toFixed(2)}<br>
          USD → SEK: ${data.usd_sek.toFixed(2)}<br>
          Total Shares: ${data.total_shares}<br>
          Invested (SEK): ${data.invested.toFixed(2)}<br>
          Current Value (SEK): ${data.value.toFixed(2)}<br>
          Profit (SEK): ${data.profit.toFixed(2)}<br>
          Return: ${data.return_percent.toFixed(2)}%
        `;
        document.getElementById('portfolio').innerHTML = html;
      })
      .catch(err => {
        document.getElementById('portfolio').textContent = "Error loading portfolio";
        console.error(err);
      });
  </script>
